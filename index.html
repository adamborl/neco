<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jednoduchy Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Vitejte</h1>
        <nav>
            <ul>
                <li><a href="#home">Domu</a></li>
                <li><a href="#about">O nas</a></li>
                <li><a href="#contact">Kontakt</a></li>
            </ul>
        </nav>
    </header>
    <section id="home">
        <h2>Domu</h2>
        <p>Toto je jednoducha ukazka plnohodnotneho webu.</p>
    </section>
    <section id="about">
        <h2>O nas</h2>
        <p>Kratky popis o nas.</p>
    </section>
    <section id="contact">
        <h2>Kontakt</h2>
        <form id="contactForm">
            <label for="name">Jmeno</label>
            <input type="text" id="name" name="name" required>
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required>
            <button type="submit">Odeslat</button>
        </form>
        <div id="message"></div>
    </section>
    <footer>
        <p>&copy; 2025 Jednoduchy Web</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
